name: errand_app
description: "Errand buddy users app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase (modern compatible)
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.4.0
  firebase_database: ^11.0.0
  firebase_storage: ^12.0.0
  firebase_messaging: ^15.2.9

  # State management
  flutter_riverpod: ^2.5.1
  provider: ^6.1.2

  # Utils
  http: ^1.2.1
  dio: ^5.6.0
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  url_launcher: ^6.3.1
  permission_handler: ^11.3.1
  image_picker: ^1.1.2
  share_plus: ^7.2.1
  fluttertoast: ^8.2.8

  # Location (MODERN FIXED STACK)
  geolocator: ^12.0.0
  geocoding: ^3.0.0

  # image compression dependency
  flutter_image_compress: ^2.3.0


  # UI
  font_awesome_flutter: ^10.5.0
  animated_text_kit: ^4.2.2
  flutter_rating_bar: ^4.0.1

  # Notifications
  flutter_local_notifications: ^17.0.0
  connectivity_plus: ^7.2.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  flutter_map_location_marker: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - themes/